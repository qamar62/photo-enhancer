services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: passport-photo-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    network_mode: host

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: passport-photo-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
