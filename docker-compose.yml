services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: passport-photo-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - passport-photo-network
    userns_mode: "host"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: passport-photo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - passport-photo-network
    userns_mode: "host"

networks:
  passport-photo-network:
    driver: bridge
